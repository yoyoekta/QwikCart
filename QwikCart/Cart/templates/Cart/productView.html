{% extends "Cart/basic1.html" %}
{% block title %}{{product.product_name}} - QwikCart{% endblock %}
{% block body %}

<div class="container my-4">
    <div class="row">
        <div class="col-md-4">
            <div class="row">
                <img src="/media/{{product.image}}" width="233px" height="385px">
            </div>
            <div class="row">
                <button class="btn btn-primary mx-3">Buy Now</button>
                <span id="divpr" class="divpr">
                    <button id="pr" class="btn btn-primary cart">Add To Cart</button>
                </span>
            </div>

        </div>

        <div class="col-md-8">
            <h5 id ="name">{{product.product_name}}</h5>
            <p id="price" ><b>Rs.{{product.price}} </b></p>
            <p>{{product.desc}}</p>


        </div>
    </div>


</div>

{% endblock %}

<script>
    
</script>
{% endblock %}
